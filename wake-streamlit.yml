name: Wake Streamlit app

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium

      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: "https://babolna-korfuvar-dv539ucm8ezkffgrnfkf6k.streamlit.app/"
        run: |
          python wake_streamlit.py
